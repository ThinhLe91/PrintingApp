<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>Storage Label</title>
		<link
			href="./styles.css"
			rel="stylesheet" />
		<link
			href="./styles/label-85x58.css"
			rel="stylesheet" />
		<script src="./js/JsBarcode.all.min.js"></script>
		<script src="./js/app.js"></script>
	</head>
	<body>
		<div class="page-container">
			<table class="w-100">
				<tbody>
					<tr class="h-3rem">
						<td class="center bg-grey  font-l bold">Nhãn trên bịch VCI trước xi mạ</td>
					</tr>
					<tr class="h-3rem">
						<td class="center bg-grey font-l bold">Charge number</td>
					</tr>
					<tr>
						<td class="center ">
							<div style="display: flex; flex-direction: column">
								<div class="center ">
									<svg
										class="barcode"
										data-value="BatchId"
										jsbarcode-format="CODE128"
										jsbarcode-value="BatchId"
										jsbarcode-textmargin="0"
										jsbarcode-margin="0"
										jsbarcode-height="60"
										jsbarcode-width="2"
										jsbarcode-fontoptions="bold"
										jsbarcode-fontsize="40"
										jsbarcode-displayvalue="true"
										></svg>
								</div>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</body>
</html>
