<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>DB-Sample Label</title>
		<link
			href="./styles.css"
			rel="stylesheet" />
		<link
			href="./styles/label-85x58.css"
			rel="stylesheet" />
		<style>
			.scale svg {
				transform: scaleX(1.4) !important;
			}
		</style>
		<script src="./js/JsBarcode.all.min.js"></script>
		<script src="./js/app.js"></script>
	</head>
	<body>
		<div class="page-container">
			<table class="w-100">
				<tbody>
					<tr class="h-1-5rem">
						<td class="center bg-grey  font-l bold">Disc Deburring sample</td>
					</tr>
					<tr class="h-1-5rem">
						<td class="center bg-grey bold">Article No. + Production version</td>
					</tr>
					<tr>
						<td class="center ">
							<div style="display: flex; flex-direction: column">
								<div class="center scale">
									<svg
										class="barcode"
										data-value="ArticleNumberVersion"
										jsbarcode-format="CODE128"
										jsbarcode-value="ArticleNumberVersion"
										jsbarcode-textmargin="0"
										jsbarcode-margin="0"
										jsbarcode-height="35"
										jsbarcode-width="1"
										jsbarcode-fontoptions="bold"
										jsbarcode-fontsize="20"
										jsbarcode-displayvalue="false"
										></svg>
								</div>
								<span class="bold font-l" data-value="ArticleNumberVersion"></span>
							</div>
						</td>
					</tr>
					<tr class="h-1-5rem">
						<td class="center bg-grey font-l bold">Batch number</td>
					</tr>
					<tr>
						<td class="center ">
							<div style="display: flex; flex-direction: column">
								<div class="center ">
									<svg
										class="barcode"
										data-value="BatchId"
										jsbarcode-format="CODE128"
										jsbarcode-value="BatchId"
										jsbarcode-textmargin="0"
										jsbarcode-margin="0"
										jsbarcode-height="35"
										jsbarcode-width="2"
										jsbarcode-fontoptions="bold"
										jsbarcode-fontsize="20"
										jsbarcode-displayvalue="true"
										></svg>
								</div>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</body>
</html>
